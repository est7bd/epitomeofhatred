<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Timeline — Every Documented Failure, In Order — Epitome of Hatred</title>
<meta content="A chronological record of every documented Trump lie, crime, broken promise, and failure — in order, by date. 251 sourced entries." name="description"/>
<link href="https://epitomeofhatred.com/timeline" rel="canonical"/>
<meta content="index, follow" name="robots"/>
<meta content="Timeline — Every Documented Failure, In Order" property="og:title"/>
<meta content="Chronological. Every crime, lie, and failure. Sourced. In order. No excuses, no context that makes it better." property="og:description"/>
<meta content="https://epitomeofhatred.com/assets/img/og-default.jpg" property="og:image"/>
<meta content="summary_large_image" name="twitter:card"/>
<meta content="@est7bd" name="twitter:site"/>
<meta content="Darrell Nelson" name="author"/>
<link href="/assets/css/style.css" rel="stylesheet"/>
<style>
  .page-hero { padding: 6rem 2rem 3rem; max-width: var(--max-w); margin: 0 auto; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .page-hero h1 { font-family: var(--font-display); font-size: clamp(4rem, 14vw, 9.5rem); line-height: 0.88; color: var(--text); letter-spacing: 0.02em; position: relative; z-index: 2; }
  .page-hero h1 span { color: var(--accent); }
  .page-hero .sub { margin-top: 1.25rem; font-size: 1.12rem; color: var(--text-muted); max-width: 760px; line-height: 1.6; position: relative; z-index: 2; }
  .page-hero-bg { position: absolute; right: -1rem; top: 50%; transform: translateY(-50%); font-family: var(--font-display); font-size: clamp(8rem, 22vw, 19rem); color: transparent; -webkit-text-stroke: 1px rgba(204,34,34,0.06); pointer-events: none; user-select: none; white-space: nowrap; z-index: 0; }

  .controls-strip { border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
  .controls-inner { max-width: var(--max-w); margin: 0 auto; padding: 0.9rem 2rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between; }
  .search-wrap { flex: 1; min-width: 200px; max-width: 400px; }
  .tl-search { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.04em; padding: 0.45rem 0.9rem; outline: none; transition: border-color 0.2s; }
  .tl-search:focus { border-color: var(--accent-dim); }
  .tl-search::placeholder { color: var(--text-dim); }
  .era-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .era-btn { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); border: 1px solid var(--border); background: none; padding: 0.3rem 0.65rem; cursor: pointer; transition: all 0.2s; }
  .era-btn:hover, .era-btn.active { color: var(--accent2); border-color: var(--accent-dim); background: rgba(204,34,34,0.06); }
  .results-count { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em; white-space: nowrap; }

  .timeline-wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem 6rem; }

  .year-block { margin-top: 3rem; }
  .year-label { font-family: var(--font-display); font-size: 5rem; color: var(--accent); line-height: 1; letter-spacing: 0.02em; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0; }

  .tl-entry { display: grid; grid-template-columns: 110px 1fr; gap: 0; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .tl-entry:hover { background: var(--bg2); }
  .tl-entry.hidden { display: none; }

  .tl-date-col { padding: 1.4rem 1.2rem 1.4rem 0; border-right: 1px solid var(--border); }
  .tl-date { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em; line-height: 1.5; }
  .tl-date .month { display: block; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent); }

  .tl-content { padding: 1.4rem 0 1.4rem 1.8rem; }
  .tl-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .tl-tag { font-family: var(--font-mono); font-size: 0.57rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); border: 1px solid var(--border); padding: 0.15rem 0.45rem; }
  .tl-title { font-size: 1.05rem; color: var(--text); line-height: 1.45; font-family: var(--font-body); font-weight: 600; }
  .tl-title a { color: var(--text); transition: color 0.15s; }
  .tl-title a:hover { color: var(--accent2); }

  .no-results { padding: 4rem 0; text-align: center; color: var(--text-dim); font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.1em; display: none; }

  @media (max-width: 600px) {
    .tl-entry { grid-template-columns: 70px 1fr; }
    .tl-date-col { padding: 1rem 0.8rem 1rem 0; }
    .tl-content { padding: 1rem 0 1rem 1rem; }
    .year-label { font-size: 3.5rem; }
  }
</style>
</head>
<body>
<div id="header-placeholder"></div>
<main>
<div class="page-hero">
  <div class="page-hero-bg">ORDER</div>
  <h1>Every<br><span>Failure.</span><br>In Order.</h1>
  <p class="sub">251 documented entries. Chronological. No summaries, no softening, no editorial distance. This is what happened and when it happened. The full record, top to bottom.</p>
</div>

<div class="controls-strip">
  <div class="controls-inner">
    <div class="search-wrap">
      <input class="tl-search" id="tl-search" placeholder="Search the timeline..." type="text" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="era-btns">
      <button class="era-btn active" data-era="all">All</button>
      <button class="era-btn" data-era="pre-2017">Pre-2017</button>
      <button class="era-btn" data-era="2017">2017</button>
      <button class="era-btn" data-era="2018">2018</button>
      <button class="era-btn" data-era="2019">2019</button>
      <button class="era-btn" data-era="2020">2020</button>
      <button class="era-btn" data-era="2021">2021</button>
      <button class="era-btn" data-era="2025">2025</button>
      <button class="era-btn" data-era="2026">2026</button>
    </div>
    <span class="results-count" id="tl-count"></span>
  </div>
</div>

<div class="timeline-wrap" id="timeline-wrap">
  <div class="no-results" id="no-results">No entries match that search.</div>
</div>
</main>

<div id="footer-placeholder"></div>
<script src="/assets/js/includes.js"></script>
<script>
(function() {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function parseDate(str) {
    if (!str) return null;
    const parts = str.split('-');
    if (parts.length < 1 || !parts[0]) return null;
    return {
      year: parseInt(parts[0]),
      month: parts[1] ? parseInt(parts[1]) : 0,
      day: parts[2] ? parseInt(parts[2]) : 0,
      raw: str
    };
  }

  function formatDate(d) {
    if (!d) return '';
    let out = '';
    if (d.month) out += `<span class="month">${MONTHS[d.month-1]}</span>`;
    if (d.day) out += d.day;
    return out;
  }

  function getEra(year) {
    if (!year) return 'undated';
    if (year < 2017) return 'pre-2017';
    return String(year);
  }

  async function loadPosts() {
    let html;
    try {
      const res = await fetch('/blog/', {cache: 'no-store'});
      html = await res.text();
    } catch(e) { return []; }

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const items = doc.querySelectorAll('.post-item');
    const posts = [];

    items.forEach(el => {
      const href = el.getAttribute('href');
      const dateStr = el.getAttribute('data-date') || '';
      const topics = el.getAttribute('data-topics') || '';
      const search = el.getAttribute('data-search') || '';
      const titleEl = el.querySelector('.post-item-title');
      const title = titleEl ? titleEl.textContent.trim() : '';
      if (!href || !title) return;
      posts.push({ href, dateStr, topics, search, title });
    });

    // Sort: dated posts by date desc, undated at end
    posts.sort((a, b) => {
      if (!a.dateStr && !b.dateStr) return 0;
      if (!a.dateStr) return 1;
      if (!b.dateStr) return -1;
      return b.dateStr.localeCompare(a.dateStr);
    });

    return posts;
  }

  function buildTimeline(posts) {
    const wrap = document.getElementById('timeline-wrap');
    const noResults = document.getElementById('no-results');

    // Group by year
    const byYear = {};
    const yearOrder = [];
    posts.forEach(p => {
      const d = parseDate(p.dateStr);
      const year = d ? d.year : 0;
      const key = year || 'undated';
      if (!byYear[key]) { byYear[key] = []; yearOrder.push(key); }
      byYear[key].push({...p, parsed: d});
    });

    // Dedupe year order, preserve order
    const seen = new Set();
    const years = yearOrder.filter(y => { if (seen.has(y)) return false; seen.add(y); return true; });

    years.forEach(year => {
      const block = document.createElement('div');
      block.className = 'year-block';
      block.dataset.year = year;

      const label = document.createElement('div');
      label.className = 'year-label';
      label.textContent = year === 'undated' ? '—' : year;
      block.appendChild(label);

      byYear[year].forEach(p => {
        const era = p.parsed ? getEra(p.parsed.year) : 'undated';
        const tags = p.topics.split(' ').filter(Boolean).slice(0, 4);

        const entry = document.createElement('div');
        entry.className = 'tl-entry';
        entry.dataset.era = era;
        entry.dataset.search = (p.title + ' ' + p.search + ' ' + p.topics).toLowerCase();

        const tagsHtml = tags.map(t => `<span class="tl-tag">${t.replace(/-/g,' ')}</span>`).join('');

        entry.innerHTML = `
          <div class="tl-date-col">
            <div class="tl-date">${formatDate(p.parsed)}</div>
          </div>
          <div class="tl-content">
            <div class="tl-tags">${tagsHtml}</div>
            <div class="tl-title"><a href="${p.href}">${p.title}</a></div>
          </div>`;

        block.appendChild(entry);
      });

      wrap.insertBefore(block, noResults);
    });

    updateCount();
  }

  function updateCount() {
    const visible = document.querySelectorAll('.tl-entry:not(.hidden)').length;
    document.getElementById('tl-count').textContent = visible + ' entries';
  }

  function applyFilters() {
    const query = document.getElementById('tl-search').value.toLowerCase().trim();
    const activeEra = document.querySelector('.era-btn.active').dataset.era;
    let visible = 0;

    document.querySelectorAll('.tl-entry').forEach(el => {
      const eraMatch = activeEra === 'all' || el.dataset.era === activeEra;
      const searchMatch = !query || el.dataset.search.includes(query);
      if (eraMatch && searchMatch) { el.classList.remove('hidden'); visible++; }
      else el.classList.add('hidden');
    });

    // Hide year blocks with no visible entries
    document.querySelectorAll('.year-block').forEach(block => {
      const hasVisible = block.querySelectorAll('.tl-entry:not(.hidden)').length > 0;
      block.style.display = hasVisible ? '' : 'none';
    });

    document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
    document.getElementById('tl-count').textContent = visible + ' entries';
  }

  // Era filter buttons
  document.querySelectorAll('.era-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    });
  });

  // Search
  document.getElementById('tl-search').addEventListener('input', applyFilters);

  // Load and render
  loadPosts().then(posts => {
    buildTimeline(posts);
  });
})();
</script>
</body>
</html>
