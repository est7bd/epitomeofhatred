      <h1>The State of the Union Was a Work of Fiction.</h1>
      <p class="deck">On February 24th, Trump delivered the longest State of the Union address in history. He also delivered one of the most dishonest. Here's the annotated version — every major lie, every exaggeration, every fabrication. With sources.</p>
    </div>

    <div class="post-body">
      <a href="/blog" class="back-link">← all posts</a>

      <p>Trump stood before Congress on February 24th and declared that "our nation is back, bigger, better, richer and stronger than ever before." He claimed a roaring economy. Record jobs. Ending wars. Protecting seniors. Saving prescription drug costs.</p>

      <p>Almost none of it was true. NBC News, PBS, FactCheck.org, and others went through the speech line by line. What they found was a greatest hits collection of Trump fabrications — some familiar, some new, all documented, all provably false. Here's the annotated version.</p>

      <h2>The Jobs Lies.</h2>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 1</span>
        <span class="lie-counter-label">Construction Jobs</span>
      </div>
      <div class="sotu-quote"><p>"We've created 70,000 new construction jobs."</p></div>
      <div class="sotu-reality">
        <p>The Bureau of Labor Statistics shows <strong>44,000 construction jobs were added</strong> from January 2025 to January 2026. Trump inflated the number by nearly 60%. Not a rounding error — a fabrication.</p>
        <div class="source-links">
          <a href="https://www.nbcnews.com/politics/donald-trump/state-of-union-fact-check-trump-speech-2026-rcna259900" target="_blank" rel="noopener" class="source-link">NBC News Fact Check</a>
          <a href="https://www.factcheck.org/person/donald-trump/" target="_blank" rel="noopener" class="source-link">FactCheck.org</a>
        </div>
      </div>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 2</span>
        <span class="lie-counter-label">Food Stamps</span>
      </div>
      <div class="sotu-quote"><p>"We have lifted 2.4 million Americans — a record — off of food stamps."</p></div>
      <div class="sotu-reality">
        <p>This needs context Trump deliberately left out. Those 2.4 million people aren't thriving — they're <strong>losing eligibility</strong> because of new work requirements in Trump's One Big Beautiful Bill. Being removed from a program because you were cut off is not the same as being lifted out of poverty. Nearly 42 million Americans still rely on food stamps. This stat is a cruel rebranding of people losing food assistance as an economic success story.</p>
        <div class="source-links">
          <a href="https://www.nbcnews.com/politics/donald-trump/state-of-union-fact-check-trump-speech-2026-rcna259900" target="_blank" rel="noopener" class="source-link">NBC News Fact Check</a>
        </div>
      </div>

      <h2>The Crime Lies.</h2>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 3</span>
        <span class="lie-counter-label">"Almost No Crime" in DC</span>
      </div>
      <div class="sotu-quote"><p>"There is almost no crime in Washington, D.C. right now."</p></div>
      <div class="sotu-reality">
        <p>Metropolitan Police Department data shows that since January 1, 2026 there have been <strong>9 homicides, 126 assaults with a dangerous weapon, and 322 motor vehicle thefts</strong> in Washington DC. Year-to-date homicides are down 67% — which is genuinely good news — but "almost no crime" is not a description of any real city on Earth. Assault with a dangerous weapon is actually the <strong>only crime category that increased</strong> in 2026 so far.</p>
        <div class="source-links">
          <a href="https://www.nbcnews.com/politics/donald-trump/state-of-union-fact-check-trump-speech-2026-rcna259900" target="_blank" rel="noopener" class="source-link">NBC News Fact Check</a>
        </div>
      </div>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 4</span>
        <span class="lie-counter-label">Immigrant Murders</span>
      </div>
      <div class="sotu-quote"><p>"They poured in by the millions and millions — from prisons, from mental institutions. There were murders — 11,888 murders. They came into our country."</p></div>
      <div class="sotu-reality">
        <p>There is <strong>no evidence that millions of migrants came from prisons and mental institutions</strong>. The 11,888 figure refers to convicted murderers without legal status not currently in ICE custody — but that number cannot be attributed exclusively to Biden, since it's not clear when those individuals entered the US or under what circumstances. Trump's framing deliberately conflates legal status with criminality in a way the data does not support.</p>
        <div class="source-links">
          <a href="https://www.nbcnews.com/politics/donald-trump/state-of-union-fact-check-trump-speech-2026-rcna259900" target="_blank" rel="noopener" class="source-link">NBC News Fact Check</a>
        </div>
      </div>

      <h2>The Healthcare Lies.</h2>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 5</span>
        <span class="lie-counter-label">Prescription Drug Costs</span>
      </div>
      <div class="sotu-quote"><p>"I am also ending the wildly inflated cost of prescription drugs. Other presidents tried to do it, but they never could. They didn't even come close."</p></div>
      <div class="sotu-reality">
        <p>This is <strong>false</strong>. In 2022, President Biden signed the Inflation Reduction Act which capped insulin at $35/month for Medicare recipients, placed a $2,000 annual cap on out-of-pocket drug costs for Medicare patients, and — for the first time ever — allowed Medicare to negotiate prescription drug prices directly with manufacturers. Biden didn't just "come close." He actually did it. Trump is taking credit for work already done and erasing the person who did it.</p>
        <div class="source-links">
          <a href="https://www.nbcnews.com/politics/donald-trump/state-of-union-fact-check-trump-speech-2026-rcna259900" target="_blank" rel="noopener" class="source-link">NBC News Fact Check</a>
          <a href="https://www.factcheck.org/person/donald-trump/" target="_blank" rel="noopener" class="source-link">FactCheck.org</a>
        </div>
      </div>

      <h2>The "I Ended All the Wars" Lies.</h2>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 6</span>
        <span class="lie-counter-label">World Peace Claims</span>
      </div>
      <div class="sotu-quote"><p>Trump claimed credit for ending conflicts between Israel and Iran, Egypt and Ethiopia, Thailand and Cambodia, Serbia and Kosovo, Rwanda and the Democratic Republic of Congo, Armenia and Azerbaijan, and India and Pakistan.</p></div>
      <div class="sotu-reality">
        <p>There is <strong>no consensus that Trump ended these conflicts</strong>, and in several cases fighting resumed after declarations of peace or ceasefires — including between Thailand and Cambodia and Rwanda and the Democratic Republic of Congo. His impact as a mediator in the cases where peace did hold is heavily disputed. Meanwhile, Trump started his <em>own</em> war — with Iran — in February 2026. The man claiming to have ended seven wars launched a new one the same month he gave this speech.</p>
        <div class="source-links">
          <a href="https://www.nbcnews.com/politics/donald-trump/state-of-union-fact-check-trump-speech-2026-rcna259900" target="_blank" rel="noopener" class="source-link">NBC News Fact Check</a>
        </div>
      </div>

      <h2>The Economy Lies.</h2>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 7</span>
        <span class="lie-counter-label">The "Roaring Economy"</span>
      </div>
      <div class="sotu-quote"><p>"The roaring economy is roaring like never before." / "Our nation is back, bigger, better, richer and stronger than ever before."</p></div>
      <div class="sotu-reality">
        <p>The same week Trump said this, the US economy reported <strong>job losses, rising gasoline prices, and increasing uncertainty</strong>. The Dow Jones had dropped 5% over the prior month. The unemployment rate for US-born workers climbed to 4.7% from 4.4% over the previous year. <strong>70% of Americans predicted 2026 would be a year of economic difficulty</strong>. Two-thirds expressed concern about tariff impacts on their finances. The "roaring economy" was roaring straight into people's wallets and not in a good way.</p>
        <div class="source-links">
          <a href="https://www.pbs.org/newshour/politics/trumps-roaring-economy-meets-a-rough-start-to-2026-with-job-losses-rising-gas-prices-and-uncertainty" target="_blank" rel="noopener" class="source-link">PBS NewsHour</a>
          <a href="https://www.pbs.org/newshour/politics/fact-checking-trumps-false-claims-ahead-of-the-state-of-the-union" target="_blank" rel="noopener" class="source-link">PBS — SOTU Fact Check</a>
          <a href="https://www.americanprogress.org/article/a-year-in-review-how-the-trump-administrations-economic-policies-made-life-less-affordable-for-americans/" target="_blank" rel="noopener" class="source-link">Center for American Progress</a>
        </div>
      </div>

      <div class="lie-counter">
        <span class="lie-counter-num">LIE 8</span>
        <span class="lie-counter-label">The 2024 "Landslide"</span>
      </div>
      <div class="sotu-quote"><p>Trump repeatedly calls his 2024 win a "landslide."</p></div>
      <div class="sotu-reality">
        <p>Trump won 312 electoral votes to 226 — every swing state, which is genuinely impressive. But a landslide it is not. By comparison, Reagan won 525 electoral votes in 1984. Nixon won 520 in 1972. LBJ won 486 in 1964. Trump's margin was solid but historically unremarkable. He won. He didn't need to inflate it. But inflating things is what he does.</p>
        <div class="source-links">
          <a href="https://www.pbs.org/newshour/politics/fact-checking-trumps-false-claims-ahead-of-the-state-of-the-union" target="_blank" rel="noopener" class="source-link">PBS NewsHour</a>
        </div>
      </div>

      <div class="pull-quote">
        <p>This was the longest State of the Union address in history. It was also, fact-checkers agreed, one of the most dishonest. Quantity and quality going in opposite directions, as usual.</p>
      </div>

      <p>Eight documented lies. In one speech. That Congress applauded. That Fox News called historic. That millions of people watched and believed.</p>

      <p>This is what normal looks like now. A president who lies about the number of jobs created, lies about crime statistics, lies about who deserves credit for lowering drug prices, lies about ending wars while starting new ones, and lies about the state of the economy while 70% of Americans expect the year to be economically painful.</p>

      <p>And the response from his party? Applause. Standing ovations. Not a single Republican in that chamber stood up and said "that's not true." Not one.</p>

      <p>That's not a party. That's a cult with a podium.</p>
