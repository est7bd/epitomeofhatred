  .results-wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem 6rem; }

  .result-item:hover { background: var(--bg2); }

  .result-date { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em; padding: 1.4rem 1rem 1.4rem 0; border-right: 1px solid var(--border); white-space: nowrap; }
  .result-body { padding: 1.4rem 0 1.4rem 1.8rem; }
  .result-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .result-tag { font-family: var(--font-mono); font-size: 0.57rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); border: 1px solid var(--border); padding: 0.15rem 0.4rem; }
  .result-title { font-size: 1.1rem; color: var(--text); line-height: 1.45; font-weight: 600; margin-bottom: 0.4rem; }

  .prompt-state span { display: block; font-family: var(--font-display); font-size: 4rem; color: var(--border); margin-bottom: 1rem; letter-spacing: 0.05em; }

  @media (max-width: 600px) {

  <meta name="description" content="Search 259 sourced posts on Trump, MAGA, and Republican corruption.">

<body>
<div id="header-placeholder"></div>
<main>

<div class="search-hero">
  <div class="search-hero-bg">FIND</div>
  <h1>Find <span>The</span><br>Receipt.</h1>
</div>

<div class="search-bar-wrap">
  <input type="text" id="main-search" class="search-input-big" placeholder="Search 255 documented posts..." autocomplete="off" spellcheck="false" autofocus/>
</div>

<div class="filter-strip">
  <span class="filter-label">Topic:</span>
  <button class="f-btn active" data-topic="all">All</button>
  <button class="f-btn" data-topic="corruption">Corruption</button>
  <button class="f-btn" data-topic="immigration">Immigration</button>

  <button class="f-btn" data-topic="covid">COVID</button>
  <button class="f-btn" data-topic="economy">Economy</button>
  <button class="f-btn" data-topic="courts">Courts</button>
  <button class="f-btn" data-topic="iran-war">Iran War</button>
  <button class="f-btn" data-topic="doge">DOGE</button>
  <button class="f-btn" data-topic="january-6">Jan 6</button>
  <button class="f-btn" data-topic="lies">Lies</button>
  <button class="f-btn" data-topic="healthcare">Healthcare</button>
  <button class="f-btn" data-topic="environment">Environment</button>
  <button class="f-btn" data-topic="veterans">Veterans</button>
</div>

<div class="results-wrap">
  <div class="results-meta" id="results-meta" style="display:none"></div>
  <div id="results-list">
    <div class="prompt-state" id="prompt-state">
      <span>255</span>
      sourced, documented posts — start typing to search
    </div>

      <span>0</span>
      Nothing matched that search. Try different terms.
    </div>
  </div>
</div>

</main>
<div id="footer-placeholder"></div>
<script src="/assets/js/includes.js"></script>
<script>
(function() {
  const MONTHS = {
    '01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun',
    '07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'
  };

  function formatDate(str) {
    if (!str) return '—';
    const p = str.split('-');
    if (p.length === 3) return `${MONTHS[p[1]] || p[1]} ${p[2]}, ${p[0]}`;
    if (p.length === 2) return `${MONTHS[p[1]] || p[1]} ${p[0]}`;
    return p[0];
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlight(text, query) {
    if (!query) return escapeHtml(text);
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escapeHtml(text).replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
  }

  function excerpt(text, query, maxLen = 160) {
    if (!text) return '';
    if (!query) return text.slice(0, maxLen) + (text.length > maxLen ? '…' : '');
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    const start = Math.max(0, idx - 60);
    const end = Math.min(text.length, start + maxLen);
    let slice = text.slice(start, end);
    if (start > 0) slice = '…' + slice;
    if (end < text.length) slice += '…';
    return slice;
  }

  let allPosts = [];
  let loaded = false;

  async function loadPosts() {
    if (loaded) return;
    try {
      const res = await fetch('/blog/', {cache: 'no-store'});
      const html = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const items = doc.querySelectorAll('.post-item');
      items.forEach(el => {
        const href = el.getAttribute('href') || '';
        const dateStr = el.getAttribute('data-date') || '';
        const topics = el.getAttribute('data-topics') || '';
        const searchText = el.getAttribute('data-search') || '';
        const titleEl = el.querySelector('.post-item-title');
        const title = titleEl ? titleEl.textContent.trim() : '';
        if (!href || !title) return;
        allPosts.push({ href, dateStr, topics, searchText, title });
      });
      loaded = true;
    } catch(e) {}
  }

  function renderResults(query, topic) {
    const list = document.getElementById('results-list');
    const meta = document.getElementById('results-meta');
    const prompt = document.getElementById('prompt-state');
    const noResults = document.getElementById('no-results');

    const q = query.toLowerCase().trim();
    const hasQuery = q.length > 0 || topic !== 'all';

    if (!hasQuery) {
      prompt.style.display = '';
      noResults.style.display = 'none';
      meta.style.display = 'none';
      // Remove rendered items
      list.querySelectorAll('.result-item').forEach(el => el.remove());
      return;
    }

    prompt.style.display = 'none';

    const filtered = allPosts.filter(p => {
      const topicMatch = topic === 'all' || p.topics.split(' ').includes(topic);
      const searchMatch = !q || (p.title + ' ' + p.searchText + ' ' + p.topics).toLowerCase().includes(q);
      return topicMatch && searchMatch;
    });

    // Remove old results
    list.querySelectorAll('.result-item').forEach(el => el.remove());

    if (filtered.length === 0) {
      noResults.style.display = 'block';
      meta.style.display = 'none';
      return;
    }

    noResults.style.display = 'none';
    meta.style.display = 'block';
    meta.textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}${q ? ` for "${query}"` : ''}`;

    const frag = document.createDocumentFragment();
    filtered.forEach(p => {
      const tags = p.topics.split(' ').filter(Boolean).slice(0, 4);
      const tagsHtml = tags.map(t => `<span class="result-tag">${t.replace(/-/g,' ')}</span>`).join('');
      const ex = excerpt(p.searchText, q);

      const el = document.createElement('a');
      el.className = 'result-item';
      el.href = p.href;
      el.innerHTML = `
        <div class="result-date">${formatDate(p.dateStr)}</div>
        <div class="result-body">
          <div class="result-tags">${tagsHtml}</div>
          <div class="result-title">${highlight(p.title, q)}</div>
          ${ex ? `<div class="result-excerpt">${highlight(ex, q)}</div>` : ''}
        </div>`;
      frag.appendChild(el);
    });
    list.appendChild(frag);
  }

  let currentTopic = 'all';
  let searchTimeout;

  function doSearch() {
    const q = document.getElementById('main-search').value;
    renderResults(q, currentTopic);
  }

  document.getElementById('main-search').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(doSearch, 120);
  });

  document.querySelectorAll('.f-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTopic = btn.dataset.topic;
      doSearch();
    });
  });

  // Handle ?q= param on load
  const urlQ = new URLSearchParams(window.location.search).get('q');
  if (urlQ) {
    document.getElementById('main-search').value = urlQ;
  }

  loadPosts().then(() => {
    if (urlQ) doSearch();
  });
})();
</script>
</body>
