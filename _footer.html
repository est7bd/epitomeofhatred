    <div class="footer-links">

      <!-- Email obfuscated — assembled by JS, never in plain text -->
      <a href="#" id="contact-link" onclick="this.href='mail'+'to'+String.fromCharCode(58)+window._eoh_em();return true;" style="cursor:pointer;">contact</a>

<script>
// Email assembled from char codes — never stored as plain text
window._eoh_em = function() {
  return String.fromCharCode(102,97,99,116,115,64,101,112,105,116,111,109,101,111,102,104,97,116,114,101,100,46,99,111,109);
};
document.getElementById('footer-year').textContent = new Date().getFullYear();

// Lazy-reveal: only build the mailto when user hovers the link
var cl = document.getElementById('contact-link');
if (cl) {
  cl.addEventListener('mouseenter', function() {
    this.href = 'mailto:' + window._eoh_em();
  });
  cl.addEventListener('touchstart', function() {
    this.href = 'mailto:' + window._eoh_em();
  }, {passive:true});
}
</script>
